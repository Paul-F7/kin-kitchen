<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aki reconnects people with Indigenous food traditions. Upload an ingredient photo to discover traditional names, cultural uses, and recipes from Indigenous Nations.">
  <meta name="theme-color" content="#2D4A35">
  <title>Aki — Indigenous Food Reconnection</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Three.js for 3D storyboard animation -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <!-- model-viewer for GLB/glTF preview (teammate generate3d feature) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>

  <header class="site-header">
    <h1>Aki</h1>
    <span class="tagline">Indigenous food reconnection</span>
  </header>

  <main>
    <section class="upload-card" aria-label="Upload ingredient photo">
      <label for="file">Upload an ingredient photo</label>
      <div class="upload-row">
        <input type="file" id="file" name="file" accept="image/*,video/*" required>
        <button class="btn-primary" type="button" id="uploadBtn">Analyse</button>
      </div>
    </section>

    <div id="result" role="region" aria-live="polite" aria-label="Analysis results"></div>
  </main>

  <!-- Story modal (teammate TTS/narration feature) -->
  <div id="story-modal" class="story-modal" role="dialog" aria-modal="true" aria-labelledby="story-modal-title" aria-hidden="true">
    <div class="story-modal__backdrop"></div>
    <div class="story-modal__box">
      <button type="button" class="story-modal__close" aria-label="Close story">×</button>
      <h2 id="story-modal-title" class="story-modal__title"></h2>
      <div class="story-modal__character" id="story-character" aria-hidden="true">
        <div class="story-character__figure">
          <div class="story-character__head"></div>
          <div class="story-character__body"></div>
          <div class="story-character__sound" aria-hidden="true"></div>
        </div>
      </div>
      <p class="story-modal__status" id="story-status">Loading story…</p>
      <audio id="story-audio" class="story-modal__audio" controls></audio>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/ar.js"></script>
  <script src="js/render.js"></script>
  <script src="js/generate3d.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/story.js"></script>
</body>
</html>
